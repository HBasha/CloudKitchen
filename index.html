
<!DOCTYPE html>
<html>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0, viewport-fit=cover'>
  <title>Cloud Kitchen Menu</title>
  <script src='https://cdn.tailwindcss.com'></script>
  <style>
    * { box-sizing: border-box; }
    body { -webkit-tap-highlight-color: transparent; }
    
    /* Mobile-first responsive text and spacing */
    @media (max-width: 640px) {
      #kitchenName { font-size: 1.5rem; line-height: 1.2; }
      #headerMessage { font-size: 0.875rem; }
      #closedBanner { font-size: 1rem; }
      #searchBox { font-size: 16px; padding: 0.5rem 0.75rem; border-radius: 0.5rem; }
      .category-btn { font-size: 0.8rem; padding: 0.4rem 0.8rem; border-radius: 1.5rem; }
      .category-scroll { gap: 0.5rem !important; }
      
      /* 2-column grid on mobile with vertical cards */
      #menuContainer { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)) !important; gap: 0.75rem !important; }
      .menu-card { display: flex; flex-direction: column; padding: 0.75rem; border-radius: 0.5rem; }
      .menu-card img { width: 100%; height: 120px; flex-shrink: 0; border-radius: 0.4rem; object-fit: cover; }
      .card-content { display: flex; flex-direction: column; gap: 0.35rem; flex: 1; }
      .menu-card h2 { font-size: 0.95rem; font-weight: 600; margin: 0.35rem 0 0 0; line-height: 1.2; }
      .menu-card p { font-size: 0.75rem; margin: 0; color: #666; line-height: 1.3; }
      .menu-card .price { font-size: 0.95rem; font-weight: 700; margin: 0.35rem 0; }
      .order-btn { padding: 0.5rem 0.5rem; font-size: 0.75rem; font-weight: 600; border-radius: 0.4rem; width: 100%; }
    }
    
    /* Tablet and desktop adjustments */
    @media (min-width: 641px) {
      #menuContainer { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)) !important; }
      .menu-card { display: flex; flex-direction: column; padding: 1rem; }
      .menu-card img { width: 100%; height: 200px; border-radius: 0.75rem; object-fit: cover; }
      .card-content { gap: 0.5rem; }
      .menu-card h2 { font-size: 1.25rem; margin-top: 0.5rem; }
      .menu-card p { font-size: 0.9rem; }
      .order-btn { padding: 0.75rem; font-size: 0.95rem; }
    }
    
    /* Hide scrollbar for horizontal scroll category pills */
    .category-scroll::-webkit-scrollbar { display: none; }
    .category-scroll { -ms-overflow-style: none; scrollbar-width: none; display: flex; }
    
    /* Ensure proper touch targets */
    button { min-height: 44px; }
    .order-btn { min-height: 36px; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body class='bg-gray-100 min-h-screen p-2 md:p-4'>

  <div class='text-center mb-3 md:mb-6'>
    <h1 id='kitchenName' class='font-bold'></h1>
    <p id='headerMessage' class='text-gray-600'></p>
    <p id='closedBanner' class='text-red-600 font-semibold mt-2 hidden'>We are currently closed.</p>
  </div>

  <div class='max-w-xl mx-auto mb-3 md:mb-6 px-1'>
    <input id='searchBox' type='text' placeholder='Search...' class='w-full border shadow focus:outline-none focus:ring-2 focus:ring-blue-600'>
  </div>

  <!-- Horizontal scroll category pills -->
  <div id='categoryTabs' class='category-scroll mb-3 md:mb-6 px-2'></div>

  <div class='max-w-xl mx-auto px-1'>
    <div id='menuContainer' class='grid grid-cols-1 gap-2 md:gap-6'></div>
  </div>

  <script src='utils.js'></script>
  <script src='script.js'></script>
</body>
</html>
