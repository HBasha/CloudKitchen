
<!DOCTYPE html>
<html>
<head>
  <meta charset='UTF-8'>
  <title>Cloud Kitchen Menu</title>
  <script src='https://cdn.tailwindcss.com'></script>
  <style>
    /* Force single column on all mobile & tablet */
    @media (max-width: 1024px) {
      #menuContainer { grid-template-columns: 1fr !important; width: 100% !important; }
    }
    /* Hide scrollbar for horizontal scroll category pills */
    .category-scroll::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class='bg-gray-100 min-h-screen p-4'>

  <div class='text-center mb-6'>
    <h1 id='kitchenName' class='text-3xl font-bold'></h1>
    <p id='headerMessage' class='text-gray-600 text-lg'></p>
    <p id='closedBanner' class='text-red-600 text-xl font-semibold mt-4 hidden'>We are currently closed.</p>
  </div>

  <div class='max-w-xl mx-auto mb-6'>
    <input id='searchBox' type='text' placeholder='Search...' class='w-full p-4 text-lg border rounded-2xl shadow'>
  </div>

  <!-- Horizontal scroll category pills -->
  <div id='categoryTabs' class='category-scroll flex gap-3 overflow-x-auto whitespace-nowrap mb-6'></div>

  <div class='max-w-xl mx-auto'>
    <div id='menuContainer' class='grid grid-cols-1 gap-6'></div>
  </div>

  <script src='utils.js'></script>
  <script src='script.js'></script>
</body>
</html>
